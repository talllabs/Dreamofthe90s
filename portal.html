<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Portal — 90's Summer Day Camp</title>
  <meta name="description" content="Check your registration details for 90's Summer Day Camp." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Boogaloo&family=Titan+One&family=Permanent+Marker&family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- Shared CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/hero.css" />
  <link rel="stylesheet" href="css/mobile.css" />

  <style>
    /* ── Portal page base ── */
    body {
      background: var(--purple);
      min-height: 100vh;
    }

    .portal-page {
      max-width: 660px;
      margin: 0 auto;
      padding: calc(var(--nav-h) + 2rem) 1.25rem 5rem;
    }

    /* ── Fun header ── */
    .portal-hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .portal-hero-tag {
      display: inline-block;
      font-family: var(--font-vt323);
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      color: var(--yellow);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .portal-hero-title {
      font-family: var(--font-marker);
      font-size: clamp(2.4rem, 8vw, 3.6rem);
      color: var(--white);
      line-height: 1.05;
      text-shadow: 4px 4px 0 var(--black);
      margin-bottom: 0.5rem;
    }

    .portal-hero-sub {
      font-family: var(--font-nunito);
      font-size: 1rem;
      color: rgba(255,255,255,0.75);
      font-weight: 600;
    }

    .portal-decorations {
      font-size: 2rem;
      letter-spacing: 0.3em;
      margin-bottom: 0.25rem;
      line-height: 1;
    }

    /* ── Lookup card ── */
    .lookup-card {
      background: var(--yellow);
      border: 4px solid var(--black);
      border-radius: var(--radius-md);
      box-shadow: 6px 6px 0 var(--black);
      padding: 2rem;
      margin-bottom: 2rem;
      position: relative;
    }

    .lookup-card::before {
      content: '🔍';
      position: absolute;
      top: -1.1rem;
      left: 1.5rem;
      font-size: 1.75rem;
      line-height: 1;
    }

    .lookup-title {
      font-family: var(--font-fredoka);
      font-size: 1.35rem;
      color: var(--black);
      margin-bottom: 0.4rem;
      margin-top: 0.25rem;
    }

    .lookup-hint {
      font-family: var(--font-nunito);
      font-size: 0.9rem;
      color: #444;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    .lookup-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .lookup-input {
      flex: 1;
      min-width: 200px;
      font-family: var(--font-nunito);
      font-size: 1rem;
      font-weight: 600;
      padding: 0.65rem 1rem;
      border: 3px solid var(--black);
      border-radius: var(--radius-md);
      background: var(--white);
      transition: box-shadow 0.15s;
    }
    .lookup-input:focus {
      outline: none;
      box-shadow: 0 0 0 3px var(--purple);
    }

    /* Error / not found */
    .lookup-error {
      display: none;
      margin-top: 0.75rem;
      background: #fff0f0;
      border: 2px solid #f5a0a0;
      border-radius: var(--radius-sm);
      padding: 0.65rem 1rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: #c00;
    }

    /* ── Results ── */
    .results-wrap { display: none; }

    .results-greeting {
      font-family: var(--font-marker);
      font-size: 1.7rem;
      color: var(--yellow);
      margin-bottom: 1.5rem;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    }

    /* Kid card */
    .reg-result-card {
      background: var(--white);
      border: 4px solid var(--black);
      border-radius: var(--radius-md);
      box-shadow: 6px 6px 0 var(--black);
      padding: 0;
      margin-bottom: 1.75rem;
      overflow: hidden;
    }

    .card-header {
      padding: 1.1rem 1.5rem 0.9rem;
      border-bottom: 3px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .card-header--1 { background: #AAE4FF; }
    .card-header--2 { background: #FFB8D8; }
    .card-header--3 { background: #A8E878; }
    .card-header--4 { background: #D4B8F0; }
    .card-header--5 { background: #FFE57A; }
    .card-header--6 { background: #FFB08A; }

    .result-child {
      font-family: var(--font-fredoka);
      font-size: 1.5rem;
      color: var(--black);
      letter-spacing: 0.02em;
    }

    .card-body {
      padding: 1.25rem 1.5rem;
    }

    .result-section-title {
      font-family: var(--font-nunito);
      font-weight: 800;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #999;
      margin: 1rem 0 0.5rem;
    }
    .result-section-title:first-child { margin-top: 0; }

    /* Week chips */
    .result-weeks {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .result-week-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.9rem;
      border: 2.5px solid var(--black);
      border-radius: var(--radius-pill);
      font-family: var(--font-nunito);
      font-size: 0.9rem;
      font-weight: 700;
    }
    .result-week-row.week-1 { background: #AAE4FF; }
    .result-week-row.week-2 { background: #FFB08A; }
    .result-week-row.week-3 { background: #FFB8D8; }
    .result-week-row.week-4 { background: #D4B8F0; }
    .result-week-row.week-5 { background: #A8E878; }
    .result-week-row.week-6 { background: #FFE57A; }
    .result-week-row.week-7 { background: #AAE4FF; }

    .result-week-num {
      font-family: var(--font-fredoka);
      font-size: 1rem;
      min-width: 60px;
      letter-spacing: 0.02em;
    }
    .result-week-dates { flex: 1; color: #333; }

    /* Payment strip */
    .payment-summary {
      background: #f4f0ff;
      border: 2.5px solid var(--black);
      border-radius: var(--radius-sm);
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .pay-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-nunito);
      font-size: 0.95rem;
    }

    .pay-row-label { color: #666; font-weight: 600; }
    .pay-row-value { font-weight: 800; }
    .pay-row--total .pay-row-value { color: var(--purple); font-size: 1.1rem; }
    .pay-row--paid  .pay-row-value { color: #2a7a2a; }
    .pay-row--balance .pay-row-value { color: var(--black); }
    .pay-row--balance.is-due .pay-row-value { color: #c00; }
    .pay-row--balance.is-clear .pay-row-value { color: #2a7a2a; }

    .pay-divider {
      border: none;
      border-top: 1.5px solid #d4c8ff;
      margin: 0.15rem 0;
    }

    /* Status badge */
    .status-tag {
      display: inline-block;
      font-family: var(--font-nunito);
      font-weight: 800;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-pill);
      border: 2.5px solid var(--black);
    }
    .status-tag--confirmed { background: #d4f0c0; color: #2a6a10; }
    .status-tag--pending   { background: #fff3cc; color: #7a5a00; }

    /* Venmo pay nudge */
    .venmo-nudge {
      margin-top: 1rem;
      background: #fff8e1;
      border: 2.5px solid var(--black);
      border-radius: var(--radius-sm);
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .venmo-nudge-title {
      font-family: var(--font-fredoka);
      font-size: 1.05rem;
      color: var(--black);
    }

    .venmo-nudge-msg {
      font-family: var(--font-nunito);
      font-size: 0.875rem;
      color: #555;
      line-height: 1.5;
    }

    .venmo-nudge-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .venmo-nudge-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #008cff;
      color: #fff;
      font-family: var(--font-nunito);
      font-weight: 800;
      font-size: 0.9rem;
      padding: 0.55rem 1.1rem;
      border: 2.5px solid var(--black);
      border-radius: var(--radius-pill);
      text-decoration: none;
      box-shadow: 3px 3px 0 var(--black);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .venmo-nudge-btn:hover {
      transform: translate(2px,2px);
      box-shadow: 1px 1px 0 var(--black);
    }

    .venmo-handle {
      font-family: var(--font-nunito);
      font-size: 0.85rem;
      font-weight: 700;
      color: #666;
    }

    /* Card footer */
    .card-footer {
      padding: 0.75rem 1.5rem;
      border-top: 2px solid #eee;
      font-family: var(--font-nunito);
      font-size: 0.82rem;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .card-footer a {
      color: var(--purple);
      font-weight: 700;
      text-decoration: none;
    }
    .card-footer a:hover { text-decoration: underline; }

    .try-again-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.5rem;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: var(--radius-pill);
      font-family: var(--font-nunito);
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--white);
      cursor: pointer;
      padding: 0.5rem 1.1rem;
      transition: background 0.15s;
    }
    .try-again-btn:hover {
      background: rgba(255,255,255,0.25);
    }

    @media (max-width: 480px) {
      .lookup-row { flex-direction: column; }
      .portal-hero-title { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav" id="site-nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo" style="text-decoration:none;">90's Summer &#9733; Day Camp</a>
    </div>
  </nav>

  <main class="portal-page">

    <!-- Hero header -->
    <div class="portal-hero">
      <div class="portal-decorations">&#11088; &#127774; &#11088;</div>
      <div class="portal-hero-tag">&#x1F3D5; Summer 2025</div>
      <h1 class="portal-hero-title">Parent Portal</h1>
      <p class="portal-hero-sub">Look up your registration, booked weeks &amp; payment status</p>
    </div>

    <!-- Lookup form -->
    <div class="lookup-card" id="lookup-card">
      <div class="lookup-title">Find your registration</div>
      <p class="lookup-hint">
        Enter the email address you used when you signed up to see your booked dates and payment status.
      </p>
      <div class="lookup-row">
        <input class="lookup-input" type="email" id="lookup-email" placeholder="your@email.com" autocomplete="email" />
        <button class="btn btn--press" id="lookup-btn" style="white-space:nowrap;display:flex;align-items:center;gap:0.5rem;">
          <span id="lookup-btn-spinner" class="spinner spinner--dark" style="display:none;width:18px;height:18px;border-width:2px;"></span>
          <span id="lookup-btn-text">Look Up</span>
        </button>
      </div>
      <div class="lookup-error" id="lookup-error"></div>
    </div>

    <!-- Results -->
    <div class="results-wrap" id="results-wrap">
      <div class="results-greeting" id="results-greeting"></div>
      <div id="results-list"></div>
      <button class="try-again-btn" id="try-again-btn">&#8592; Look up a different email</button>
    </div>

  </main>

  <script>
  (function () {
    'use strict';

    var JSONBIN_BIN_ID = '69d0a3d6856a682189fa7ef5';

    var WEEK_DATES = {
      1: 'June 8\u201312',
      2: 'June 15\u201319',
      3: 'June 22\u201326',
      4: 'June 29\u2013July 3',
      5: 'July 6\u201310',
      6: 'July 13\u201317',
      7: 'July 20\u201324'
    };

    // Card header colors cycle
    var HEADER_COLORS = ['--1','--2','--3','--4','--5','--6'];

    var emailInput  = document.getElementById('lookup-email');
    var lookupBtn   = document.getElementById('lookup-btn');
    var errorBox    = document.getElementById('lookup-error');
    var lookupCard  = document.getElementById('lookup-card');
    var resultsWrap = document.getElementById('results-wrap');
    var resultsList = document.getElementById('results-list');
    var greeting    = document.getElementById('results-greeting');
    var tryAgainBtn = document.getElementById('try-again-btn');

    function calcOwed(kid) {
      var n = (kid.weeks || []).length;
      if (n === 0) return 0;
      return n === 7 ? 3000 : n * 500;
    }

    function fmtMoney(n) { return '$' + Number(n || 0).toLocaleString(); }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }
    function hideError() { errorBox.style.display = 'none'; }

    function doLookup() {
      var email = emailInput.value.trim().toLowerCase();
      if (!email) { showError('Please enter your email address.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Please enter a valid email address.'); return; }
      hideError();

      lookupBtn.disabled = true;
      document.getElementById('lookup-btn-spinner').style.display = '';
      document.getElementById('lookup-btn-text').textContent = 'Looking up\u2026';

      fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_BIN_ID + '/latest')
        .then(function (r) { return r.json(); })
        .then(function (json) {
          var record = json.record || {};
          var kids = (record.kids || []).filter(function (k) {
            return (k.email || '').toLowerCase().trim() === email && k.status !== 'deleted';
          });

          lookupBtn.disabled = false;
          document.getElementById('lookup-btn-spinner').style.display = 'none';
          document.getElementById('lookup-btn-text').textContent = 'Look Up';

          if (kids.length === 0) {
            showError('No registration found for that email. Please double-check the address or submit a new registration.');
            return;
          }

          renderResults(kids);
        })
        .catch(function () {
          lookupBtn.disabled = false;
          document.getElementById('lookup-btn-spinner').style.display = 'none';
          document.getElementById('lookup-btn-text').textContent = 'Look Up';
          showError('Something went wrong \u2014 please try again in a moment.');
        });
    }

    function renderResults(kids) {
      var parentName = kids[0].parentName || 'there';
      greeting.textContent = 'Hey ' + parentName + '! \uD83C\uDF89';

      resultsList.innerHTML = kids.map(function (kid, idx) {
        var headerCls = 'card-header' + HEADER_COLORS[idx % HEADER_COLORS.length];
        var owed    = calcOwed(kid);
        var paid    = kid.amountPaid || 0;
        var balance = owed - paid;
        var isConfirmed = kid.status === 'booked';

        var weeksHtml = (kid.weeks || []).sort(function(a,b){return a-b;}).map(function (wn) {
          return '<div class="result-week-row week-' + wn + '">' +
            '<span class="result-week-num">Week ' + wn + '</span>' +
            '<span class="result-week-dates">' + (WEEK_DATES[wn] || '') + '</span>' +
          '</div>';
        }).join('');

        var statusTag = '<span class="status-tag ' + (isConfirmed ? 'status-tag--confirmed' : 'status-tag--pending') + '">' +
          (isConfirmed ? '\u2713 Confirmed' : '\u23F3 Awaiting Confirmation') + '</span>';

        var payHtml = '<div class="payment-summary">' +
          '<div class="pay-row pay-row--total"><span class="pay-row-label">Total</span><span class="pay-row-value">' + fmtMoney(owed) + '</span></div>' +
          '<div class="pay-row pay-row--paid"><span class="pay-row-label">Paid</span><span class="pay-row-value">' + fmtMoney(paid) + '</span></div>' +
          '<hr class="pay-divider">' +
          '<div class="pay-row pay-row--balance ' + (balance <= 0 ? 'is-clear' : 'is-due') + '">' +
            '<span class="pay-row-label">Balance</span>' +
            '<span class="pay-row-value">' + (balance <= 0 ? 'Paid in full \u2713' : fmtMoney(balance) + ' due') + '</span>' +
          '</div>' +
          (kid.paidAt ? '<div class="pay-row"><span class="pay-row-label">Payment date</span><span class="pay-row-value" style="font-weight:600;color:#555;">' + kid.paidAt + '</span></div>' : '') +
          '</div>' +
          (balance > 0 ?
            '<div class="venmo-nudge">' +
              '<div class="venmo-nudge-title">&#x1F4B8; Pay your balance to confirm your spot!</div>' +
              '<p class="venmo-nudge-msg">Send <strong>' + fmtMoney(balance) + '</strong> via Venmo to lock in your weeks. Once Mia &amp; Ashleigh receive your payment, your status will update from <strong>\u23F3 Awaiting Confirmation</strong> to <strong>\u2713 Confirmed</strong>.</p>' +
              '<div class="venmo-nudge-actions">' +
                '<a href="https://account.venmo.com/u/Mia-Cowell" target="_blank" rel="noopener" class="venmo-nudge-btn">&#x1F4B3;&nbsp; Pay on Venmo</a>' +
                '<span class="venmo-handle">@Mia-Cowell &nbsp;&bull;&nbsp; last 4: <strong>6286</strong></span>' +
              '</div>' +
            '</div>'
          : '');

        return '<div class="reg-result-card">' +
          '<div class="card-header ' + headerCls + '">' +
            '<div class="result-child">' + esc(kid.childName || 'Your child') + (kid.childAge ? ', age ' + esc(kid.childAge) : '') + '</div>' +
            statusTag +
          '</div>' +
          '<div class="card-body">' +
            '<div class="result-section-title">Weeks Booked</div>' +
            '<div class="result-weeks">' + (weeksHtml || '<p style="color:#999;font-size:0.9rem;">No weeks selected.</p>') + '</div>' +
            '<div class="result-section-title">Payment</div>' +
            payHtml +
            (kid.notes ? '<div class="result-section-title">Your Notes</div><div style="font-family:var(--font-body);font-size:0.9rem;color:#555;">' + esc(kid.notes) + '</div>' : '') +
          '</div>' +
          '<div class="card-footer">' +
            '<span>Registered ' + esc(kid.registeredAt || '') + '</span>' +
            '<a href="/contact.html">Questions? Email Mia &amp; Ashleigh \u2192</a>' +
          '</div>' +
        '</div>';
      }).join('');

      lookupCard.style.display = 'none';
      resultsWrap.style.display = 'block';
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    lookupBtn.addEventListener('click', doLookup);
    emailInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLookup();
    });

    tryAgainBtn.addEventListener('click', function () {
      resultsWrap.style.display = 'none';
      lookupCard.style.display = '';
      emailInput.value = '';
      hideError();
      emailInput.focus();
    });

    // Sticky nav
    var nav = document.getElementById('site-nav');
    window.addEventListener('scroll', function () {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });

  }());
  </script>
</body>
</html>
